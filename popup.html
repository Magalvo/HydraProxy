<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    /* ── Reset & base ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg0: #0b1520;
      --bg1: #0f1e2d;
      --bg2: #162436;
      --bg3: #1c2e42;
      --bg4: #22374f;
      --border: #1e3248;
      --border2: #243d58;
      --blue: #5ab4ff;
      --blue-dim: #1a4a7a;
      --blue-bg: #0d2a4a;
      --green: #4cd9a0;
      --green-dim: #1d6b4a;
      --green-bg: #0f3a2a;
      --red: #ff6b6b;
      --red-dim: #6b2020;
      --red-bg: #2a0f0f;
      --text0: #d0e8ff;
      --text1: #8aaccc;
      --text2: #4a6a8a;
      --text3: #2a4a6a;
      --radius: 7px;
      --radius-sm: 5px;
    }

    body {
      width: 380px;
      min-height: 200px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      background: var(--bg0);
      color: var(--text0);
      overflow-x: hidden;
    }

    /* ── Header ──────────────────────────────────────── */
    .header {
      background: var(--bg1);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .header-icon {
      width: 26px; height: 26px;
      flex-shrink: 0;
    }
    .header-icon img { width: 100%; height: 100%; }
    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text0);
      flex: 1;
      letter-spacing: 0.3px;
    }
    .header-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .badge-direct  { background: var(--bg3); color: var(--text2); border: 1px solid var(--border2); }
    .badge-system  { background: #2a2020; color: #cc9944; border: 1px solid #4a3820; }
    .badge-smart   { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-dim); }
    .badge-global  { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-dim); }
    .badge-unknown { background: var(--bg3); color: var(--text2); border: 1px solid var(--border2); }

    /* ── Status bar ──────────────────────────────────── */
    .status-bar {
      background: var(--bg0);
      border-bottom: 1px solid var(--border);
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-green  { background: var(--green); box-shadow: 0 0 5px var(--green-dim); }
    .dot-gray   { background: var(--text2); }
    .dot-orange { background: #cc9944; }
    .status-text { font-size: 11px; color: var(--text1); flex: 1; line-height: 1.4; }
    .status-text b { color: var(--text0); font-weight: 600; }

    /* ── Section labels ──────────────────────────────── */
    .section-label {
      padding: 9px 14px 5px;
      font-size: 9px;
      font-weight: 700;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      background: var(--bg1);
    }

    /* ── Mode selector ───────────────────────────────── */
    .mode-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      padding: 6px 14px 10px;
      background: var(--bg1);
    }
    .mode-btn {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 4px 7px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .mode-btn:hover { border-color: var(--border2); background: var(--bg3); }
    .mode-btn.active {
      border-color: var(--blue);
      background: var(--blue-bg);
    }
    .mode-btn.active .mode-label { color: var(--blue); }
    .mode-icon { font-size: 14px; margin-bottom: 3px; line-height: 1; }
    .mode-label { font-size: 10px; color: var(--text1); font-weight: 600; letter-spacing: 0.2px; }

    /* ── Divider ─────────────────────────────────────── */
    .divider { height: 1px; background: var(--border); }

    /* ── Profiles section ────────────────────────────── */
    .profiles-header {
      padding: 9px 14px 5px;
      font-size: 9px;
      font-weight: 700;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      background: var(--bg1);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .add-btn {
      background: var(--blue-bg);
      border: 1px solid var(--blue-dim);
      color: var(--blue);
      border-radius: var(--radius-sm);
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      letter-spacing: 0.2px;
    }
    .add-btn:hover { background: #0f3560; }

    .profiles-list { background: var(--bg1); }

    .profile-item {
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 9px;
      transition: background 0.1s;
      cursor: pointer;
    }
    .profile-item:hover { background: var(--bg2); }
    .profile-item.active-profile {
      background: var(--blue-bg);
      border-left: 2px solid var(--blue);
      padding-left: 12px;
    }
    .profile-indicator {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--border2);
    }
    .profile-indicator.active-dot { background: var(--blue); }

    .profile-info { flex: 1; min-width: 0; }
    .profile-name {
      font-size: 12px;
      color: var(--text0);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .profile-detail { font-size: 10px; color: var(--text2); margin-top: 2px; }

    .profile-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .act-btn {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text1);
      border-radius: var(--radius-sm);
      padding: 3px 7px;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s;
      white-space: nowrap;
    }
    .act-btn:hover { background: var(--bg4); }
    .act-btn.del { border-color: var(--red-dim); color: var(--red); background: var(--red-bg); }
    .act-btn.del:hover { background: #3a1010; }

    .empty-profiles {
      padding: 16px 14px;
      text-align: center;
      color: var(--text2);
      font-size: 11px;
      font-style: italic;
    }

    /* ── Smart rules section ─────────────────────────── */
    .rules-section { background: var(--bg0); }
    .rules-header {
      padding: 9px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }
    .rules-title {
      font-size: 9px;
      font-weight: 700;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      flex: 1;
    }
    .rules-count {
      background: var(--blue-bg);
      color: var(--blue);
      border-radius: 20px;
      padding: 1px 7px;
      font-size: 9px;
      font-weight: 700;
    }
    .rules-chevron { font-size: 9px; color: var(--text2); transition: transform 0.2s; }
    .rules-chevron.open { transform: rotate(180deg); }

    .rules-body { display: none; }
    .rules-body.open { display: block; }

    .rule-item {
      padding: 7px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .rule-domain { font-size: 11px; color: var(--text1); flex: 1; font-family: 'Consolas', monospace; }
    .rule-via {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      letter-spacing: 0.3px;
    }
    .via-proxy  { color: var(--green); background: var(--green-bg); border: 1px solid var(--green-dim); }
    .via-direct { color: var(--text2); background: var(--bg2); border: 1px solid var(--border2); }
    .rule-del-btn {
      background: none;
      border: none;
      color: var(--red-dim);
      cursor: pointer;
      font-size: 12px;
      padding: 0 2px;
      line-height: 1;
      transition: color 0.12s;
    }
    .rule-del-btn:hover { color: var(--red); }

    .no-rules { padding: 10px 14px; font-size: 11px; color: var(--text2); font-style: italic; }

    /* ── Add rule footer ─────────────────────────────── */
    .add-rule-row {
      padding: 9px 14px;
      background: var(--bg0);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .domain-input {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border2);
      color: var(--text0);
      border-radius: var(--radius-sm);
      padding: 5px 8px;
      font-size: 11px;
      font-family: 'Consolas', monospace;
      outline: none;
      min-width: 0;
    }
    .domain-input:focus { border-color: var(--blue); }
    .profile-select {
      background: var(--bg2);
      border: 1px solid var(--border2);
      color: var(--text0);
      border-radius: var(--radius-sm);
      padding: 5px 5px;
      font-size: 11px;
      outline: none;
      cursor: pointer;
      max-width: 100px;
    }
    .profile-select:focus { border-color: var(--blue); }
    .save-rule-btn {
      background: var(--blue-bg);
      border: 1px solid var(--blue-dim);
      color: var(--blue);
      border-radius: var(--radius-sm);
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s;
    }
    .save-rule-btn:hover { background: #0f3560; }
    .add-rule-hint { font-size: 9px; color: var(--text3); padding: 0 14px 6px; background: var(--bg0); }

    /* ── Bypass / Advanced section ───────────────────── */
    .advanced-section { background: var(--bg0); border-top: 1px solid var(--border); }
    .advanced-header {
      padding: 9px 14px;
      display: flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .advanced-title {
      font-size: 9px;
      font-weight: 700;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      flex: 1;
    }
    .advanced-chevron { font-size: 9px; color: var(--text3); transition: transform 0.2s; }
    .advanced-chevron.open { transform: rotate(180deg); }
    .advanced-body { display: none; padding: 0 14px 10px; }
    .advanced-body.open { display: block; }
    .bypass-label { font-size: 10px; color: var(--text2); margin-bottom: 5px; }
    .bypass-textarea {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border2);
      color: var(--text0);
      border-radius: var(--radius-sm);
      padding: 6px 8px;
      font-size: 11px;
      font-family: 'Consolas', monospace;
      resize: vertical;
      min-height: 54px;
      outline: none;
      line-height: 1.5;
    }
    .bypass-textarea:focus { border-color: var(--blue); }
    .bypass-save-btn {
      margin-top: 5px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text1);
      border-radius: var(--radius-sm);
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s;
    }
    .bypass-save-btn:hover { background: var(--bg4); }

    /* ── Error toast ─────────────────────────────────── */
    #errorToast {
      display: none;
      margin: 0 14px 8px;
      padding: 7px 10px;
      background: var(--red-bg);
      border: 1px solid var(--red-dim);
      color: var(--red);
      border-radius: var(--radius-sm);
      font-size: 11px;
      line-height: 1.4;
    }

    /* ── Profile form overlay ────────────────────────── */
    #profileFormOverlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(5, 12, 22, 0.85);
      z-index: 100;
      align-items: flex-end;
      justify-content: stretch;
    }
    #profileFormOverlay.open { display: flex; }
    .profile-form {
      width: 100%;
      background: var(--bg1);
      border-top: 1px solid var(--border2);
      padding: 14px;
      animation: slideUp 0.18s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .form-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text0);
      margin-bottom: 12px;
      letter-spacing: 0.2px;
    }
    .form-row { display: flex; gap: 6px; margin-bottom: 7px; }
    .form-input {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border2);
      color: var(--text0);
      border-radius: var(--radius-sm);
      padding: 6px 8px;
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--blue); }
    .form-input::placeholder { color: var(--text2); }
    .form-select {
      background: var(--bg2);
      border: 1px solid var(--border2);
      color: var(--text0);
      border-radius: var(--radius-sm);
      padding: 6px 5px;
      font-size: 12px;
      outline: none;
      cursor: pointer;
    }
    .form-select:focus { border-color: var(--blue); }
    .form-inline-error {
      display: none;
      font-size: 10px;
      color: var(--red);
      margin-bottom: 6px;
      padding: 4px 8px;
      background: var(--red-bg);
      border: 1px solid var(--red-dim);
      border-radius: var(--radius-sm);
    }
    .form-btns { display: flex; gap: 6px; margin-top: 10px; }
    .form-save {
      flex: 1;
      background: var(--blue-bg);
      border: 1px solid var(--blue-dim);
      color: var(--blue);
      border-radius: var(--radius-sm);
      padding: 7px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.12s;
    }
    .form-save:hover { background: #0f3560; }
    .form-cancel {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text1);
      border-radius: var(--radius-sm);
      padding: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s;
    }
    .form-cancel:hover { background: var(--bg4); }

    /* ── Confirm dialog ──────────────────────────────── */
    #confirmDialog {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(5, 12, 22, 0.88);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #confirmDialog.open { display: flex; }
    .confirm-box {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 16px;
      width: 280px;
      text-align: center;
      animation: slideUp 0.15s ease;
    }
    .confirm-box p { font-size: 12px; color: var(--text1); margin-bottom: 14px; line-height: 1.5; }
    .confirm-btns { display: flex; gap: 8px; }
    .confirm-yes {
      flex: 1;
      background: var(--red-bg);
      border: 1px solid var(--red-dim);
      color: var(--red);
      border-radius: var(--radius-sm);
      padding: 7px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .confirm-no {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text1);
      border-radius: var(--radius-sm);
      padding: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body style="position: relative;">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <img src="icons/HydraProxyMini.png" alt="HydraProxy">
    </div>
    <span class="header-title">HydraProxy</span>
    <span id="headerBadge" class="header-badge badge-unknown">…</span>
  </div>

  <!-- Status bar: single-sentence context line -->
  <div class="status-bar">
    <div id="statusDot" class="status-dot dot-gray"></div>
    <span id="statusText" class="status-text">Loading…</span>
  </div>

  <!-- Mode selector -->
  <div class="section-label">Connection mode</div>
  <div class="mode-row">
    <div class="mode-btn" id="btn-direct" title="Bypass all proxies">
      <div class="mode-icon">⊘</div>
      <div class="mode-label">Direct</div>
    </div>
    <div class="mode-btn" id="btn-system" title="Use OS system proxy">
      <div class="mode-icon">⚙</div>
      <div class="mode-label">System</div>
    </div>
    <div class="mode-btn" id="btn-smart" title="Route by domain rules">
      <div class="mode-icon">⋯</div>
      <div class="mode-label">Smart rules</div>
    </div>
  </div>

  <!-- Error toast (near actions, not bottom of page) -->
  <div id="errorToast"></div>

  <div class="divider"></div>

  <!-- Proxy profiles -->
  <div class="profiles-header">
    <span>Proxy profiles</span>
    <button class="add-btn" id="btn-new-profile">+ New profile</button>
  </div>
  <div class="profiles-list" id="profilesList"></div>

  <!-- Smart rules -->
  <div class="rules-section">
    <div class="rules-header" id="rulesToggle">
      <span class="rules-title">Smart rules</span>
      <span class="rules-count" id="rulesCount">0</span>
      <span class="rules-chevron" id="rulesChevron">▼</span>
    </div>
    <div class="rules-body open" id="rulesBody">
      <div id="rulesList"></div>
      <div class="add-rule-row">
        <input class="domain-input" id="ruleDomain" type="text" placeholder="*.example.com">
        <select class="profile-select" id="ruleProfile">
          <option value="DIRECT">DIRECT</option>
        </select>
        <button class="save-rule-btn" id="addRuleBtn">Add rule</button>
      </div>
      <div class="add-rule-hint" id="addRuleHint"></div>
    </div>
  </div>

  <!-- Advanced / Bypass list -->
  <div class="advanced-section">
    <div class="advanced-header" id="advancedToggle">
      <span class="advanced-title">Advanced · bypass list</span>
      <span class="advanced-chevron" id="advancedChevron">▼</span>
    </div>
    <div class="advanced-body" id="advancedBody">
      <div class="bypass-label">Hosts that always connect directly (comma-separated)</div>
      <textarea class="bypass-textarea" id="bypassInput" rows="2" spellcheck="false"></textarea>
      <button class="bypass-save-btn" id="bypassSaveBtn">Save bypass list</button>
    </div>
  </div>

  <!-- Profile form overlay (slide-up panel, no view swap) -->
  <div id="profileFormOverlay">
    <div class="profile-form">
      <div class="form-title" id="formTitle">New profile</div>
      <div class="form-row">
        <input class="form-input" id="formName" type="text" placeholder="Profile name" autocomplete="off">
      </div>
      <div class="form-row">
        <select class="form-select" id="formType">
          <option value="PROXY">HTTP</option>
          <option value="HTTPS">HTTPS</option>
          <option value="SOCKS">SOCKS v4</option>
          <option value="SOCKS5">SOCKS v5</option>
        </select>
        <input class="form-input" id="formHost" type="text" placeholder="Host / IP" autocomplete="off">
        <input class="form-input" id="formPort" type="number" placeholder="Port" style="max-width:72px;" min="1" max="65535">
      </div>
      <div class="form-inline-error" id="formError"></div>
      <div class="form-btns">
        <button class="form-save" id="formSaveBtn">Save</button>
        <button class="form-cancel" id="formCancelBtn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Custom confirm dialog (replaces window.confirm) -->
  <div id="confirmDialog">
    <div class="confirm-box">
      <p id="confirmMsg">Are you sure?</p>
      <div class="confirm-btns">
        <button class="confirm-yes" id="confirmYes">Delete</button>
        <button class="confirm-no" id="confirmNo">Cancel</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
